<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>
    <body class="bg-dark text-light">
        <div class="container py-4">
            <!-- Navbar styled to match the card, with two full-width buttons -->
            <nav
                class="navbar bg-dark text-light border-secondary shadow-sm mx-auto mb-3 p-0"
                style="max-width: 540px; border-radius: 0.375rem; border-width: 1px; border-style: solid"
            >
                <div class="d-flex w-100">
                    <button
                        class="btn btn-dark flex-fill border-end border-secondary rounded-0 active"
                        id="nav-classify"
                        type="button"
                    >
                        Classify
                    </button>
                    <button class="btn btn-dark flex-fill rounded-0" id="nav-train" type="button">Train</button>
                </div>
            </nav>
            <div class="card bg-dark text-light border-secondary shadow-sm mx-auto" style="max-width: 540px">
                <div class="card-body">
                    <!-- Classify Page -->
                    <div id="page-classify">
                        <div class="mb-3 d-flex gap-2 flex-wrap justify-content-center">
                            <button class="btn btn-primary" id="classify-connect">Connect</button>
                            <button class="btn btn-secondary" id="classify-disconnect">Disconnect</button>
                        </div>
                        <div class="mb-3 text-center">
                            <button class="btn btn-primary" id="classify-load-model">Load Model</button>
                        </div>
                        <div class="mb-3 d-flex gap-2 flex-wrap justify-content-center">
                            <button class="btn btn-success" id="classify-plot">Start Recording</button>
                            <button class="btn btn-danger" id="classify-stop-plot">Stop Recording</button>
                        </div>

                        <div class="accordion mb-3" id="classify-debugAccordion">
                            <div class="accordion-item bg-dark text-light border-secondary">
                                <h2 class="accordion-header" id="classify-debugHeading">
                                    <button
                                        class="accordion-button collapsed bg-dark text-light"
                                        type="button"
                                        data-bs-toggle="collapse"
                                        data-bs-target="#classify-debugCollapse"
                                        aria-expanded="false"
                                        aria-controls="classify-debugCollapse"
                                    >
                                        Debug
                                    </button>
                                </h2>
                                <div
                                    id="classify-debugCollapse"
                                    class="accordion-collapse collapse"
                                    aria-labelledby="classify-debugHeading"
                                    data-bs-parent="#classify-debugAccordion"
                                >
                                    <div class="accordion-body bg-dark text-light">
                                        <h5 class="mb-2">Classification Data</h5>
                                        <div
                                            id="classify-ml-classify-result"
                                            class="bg-dark text-light border-0 mb-2 mt-2"
                                        ></div>
                                        <h5 class="mb-2">Accelerometer Chart</h5>
                                        <div class="bg-dark rounded p-2 border border-secondary">
                                            <canvas id="classify-accel-chart" class="bg-dark"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!---------------------- Train Page (hidden by default) ----------------->
                    <div id="page-train" style="display: none">
                        <div class="mb-3 d-flex gap-2 flex-wrap justify-content-center">
                            <button class="btn btn-primary" id="train-connect">Connect</button>
                            <button class="btn btn-secondary" id="train-disconnect">Disconnect</button>
                        </div>
                        <div class="mb-3 d-flex gap-2 flex-wrap justify-content-center align-items-center">
                            <input
                                id="train-ml-label"
                                class="form-control w-auto"
                                placeholder="Label"
                                style="max-width: 160px"
                            />
                            <button class="btn btn-success" id="train-plot">Start Recording</button>
                            <button class="btn btn-danger" id="train-stop-plot">Stop Recording (Train)</button>
                            <button class="btn btn-warning" id="train-stop-plot-classify">
                                Stop Recording (Classify)
                            </button>
                            <button class="btn btn-info" id="train-stop-plot-circle">
                                Stop Recording (Circle Detect)
                            </button>
                            <button class="btn btn-secondary" id="train-stop-plot-tap">
                                Stop Recording (Tap Detect)
                            </button>
                        </div>
                        <div class="mb-3 d-flex gap-2 flex-wrap justify-content-center">
                            <button class="btn btn-info" id="train-train">Train</button>
                        </div>
                        <div class="mb-3 d-flex gap-2 flex-wrap justify-content-center">
                            <button class="btn btn-primary" id="train-load-model">Load Model</button>
                            <button class="btn btn-secondary" id="train-save-model">Save Model</button>
                        </div>
                        <div class="accordion mb-3" id="train-debugAccordion">
                            <div class="accordion-item bg-dark text-light border-secondary">
                                <h2 class="accordion-header" id="train-debugHeading">
                                    <button
                                        class="accordion-button collapsed bg-dark text-light"
                                        type="button"
                                        data-bs-toggle="collapse"
                                        data-bs-target="#train-debugCollapse"
                                        aria-expanded="false"
                                        aria-controls="train-debugCollapse"
                                    >
                                        Debug
                                    </button>
                                </h2>
                                <div
                                    id="train-debugCollapse"
                                    class="accordion-collapse collapse"
                                    aria-labelledby="train-debugHeading"
                                    data-bs-parent="#train-debugAccordion"
                                >
                                    <div class="accordion-body bg-dark text-light">
                                        <h5 class="mb-2">Training Data List</h5>
                                        <pre
                                            id="train-ml-data-list"
                                            class="bg-dark text-light border-0 mb-2 mt-2"
                                        ></pre>
                                        <h5 class="mb-2">Classification Result</h5>
                                        <div
                                            id="train-ml-classify-result"
                                            class="bg-dark text-light border-0 mb-2 mt-2"
                                        ></div>
                                        <h5 class="mb-2">Accelerometer Chart</h5>
                                        <div class="bg-dark rounded p-2 border border-secondary">
                                            <canvas id="train-accel-chart" class="bg-dark"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            // Simple page swapping logic
            const navClassify = document.getElementById('nav-classify');
            const navTrain = document.getElementById('nav-train');
            const pageClassify = document.getElementById('page-classify');
            const pageTrain = document.getElementById('page-train');
            navClassify.addEventListener('click', () => {
                navClassify.classList.add('active');
                navTrain.classList.remove('active');
                pageClassify.style.display = '';
                pageTrain.style.display = 'none';
            });
            navTrain.addEventListener('click', () => {
                navTrain.classList.add('active');
                navClassify.classList.remove('active');
                pageTrain.style.display = '';
                pageClassify.style.display = 'none';
            });
        </script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <!-- <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script> -->
        <!-- <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script> -->
        <!-- Your TypeScript entry (Vite will handle this) -->
        <script type="module" src="/src/classify-renderer.ts"></script>
        <script type="module" src="/src/trainer-renderer.ts"></script>
    </body>
</html>
